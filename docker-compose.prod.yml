services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/service_orders.db}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-*}
    volumes:
      - atlas_db:/app/data
      - atlas_uploads:/app/app/static/uploads
      - atlas_reports:/app/app/static/reports

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  atlas_db:
  atlas_uploads:
  atlas_reports:
